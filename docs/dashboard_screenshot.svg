<svg viewBox="0 0 780 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="card_blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2a3a"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="card_green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e1a"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Window chrome -->
  <rect width="780" height="420" rx="10" fill="#1c1c1e"/>
  <rect x="0" y="0" width="780" height="32" rx="10" fill="#2d2d2f"/>
  <rect x="0" y="22" width="780" height="10" fill="#2d2d2f"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <rect x="200" y="8" width="380" height="16" rx="8" fill="#3a3a3c"/>
  <text x="390" y="21" text-anchor="middle" font-size="9" fill="#8b8b8d">http://172.20.10.4:8000</text>

  <!-- Page background -->
  <rect x="0" y="32" width="780" height="388" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="390" y="76" text-anchor="middle" font-size="18" font-weight="bold" fill="#58a6ff" letter-spacing="1">🔍 LD2410S Human Detection System</text>

  <!-- Direction banner -->
  <rect x="220" y="88" width="340" height="38" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="390" y="113" text-anchor="middle" font-size="15" font-weight="bold" fill="#3fb950">Direction → CENTER</text>

  <!-- ─── Sensor Cards ─── -->
  <!-- Card 1 — Detected -->
  <rect x="60" y="144" width="190" height="150" rx="12" fill="url(#card_green)" stroke="#238636" stroke-width="1.5"/>
  <text x="155" y="170" text-anchor="middle" font-size="11" fill="#8b949e">Sensor_1 (LEFT)</text>
  <text x="155" y="198" text-anchor="middle" font-size="18" fill="#3fb950">✔ DETECTED</text>
  <text x="155" y="238" text-anchor="middle" font-size="36" font-weight="bold" fill="#58a6ff">143</text>
  <text x="155" y="258" text-anchor="middle" font-size="13" fill="#8b949e">cm</text>
  <text x="155" y="282" text-anchor="middle" font-size="10" fill="#6e7681">Move: 72 | Static: 0</text>

  <!-- Card 2 — Detected (highlighted) -->
  <rect x="295" y="144" width="190" height="150" rx="12" fill="url(#card_green)" stroke="#3fb950" stroke-width="2"/>
  <text x="390" y="170" text-anchor="middle" font-size="11" fill="#8b949e">Sensor_2 (CENTER)</text>
  <text x="390" y="198" text-anchor="middle" font-size="18" fill="#3fb950">✔ DETECTED</text>
  <text x="390" y="238" text-anchor="middle" font-size="36" font-weight="bold" fill="#58a6ff">87</text>
  <text x="390" y="258" text-anchor="middle" font-size="13" fill="#8b949e">cm</text>
  <text x="390" y="282" text-anchor="middle" font-size="10" fill="#6e7681">Move: 91 | Static: 12</text>

  <!-- Card 3 — Clear -->
  <rect x="530" y="144" width="190" height="150" rx="12" fill="url(#card_blue)" stroke="#30363d" stroke-width="1.5"/>
  <text x="625" y="170" text-anchor="middle" font-size="11" fill="#8b949e">Sensor_3 (RIGHT)</text>
  <text x="625" y="198" text-anchor="middle" font-size="18" fill="#f85149">✗ Clear</text>
  <text x="625" y="238" text-anchor="middle" font-size="36" font-weight="bold" fill="#484f58">—</text>
  <text x="625" y="258" text-anchor="middle" font-size="13" fill="#8b949e">cm</text>
  <text x="625" y="282" text-anchor="middle" font-size="10" fill="#6e7681">Move: 0 | Static: 0</text>

  <!-- Raw JSON preview -->
  <rect x="60" y="316" width="660" height="72" rx="8" fill="#0d1117" stroke="#30363d"/>
  <text x="80" y="334" font-size="9" fill="#3fb950">// output.json — live update every 500ms</text>
  <text x="80" y="350" font-size="9" fill="#c9d1d9">{"Sensor_1":{"presence":true,"distance_cm":143,"moving_energy":72},</text>
  <text x="80" y="364" font-size="9" fill="#c9d1d9"> "Sensor_2":{"presence":true,"distance_cm":87,"moving_energy":91},</text>
  <text x="80" y="378" font-size="9" fill="#c9d1d9"> "Sensor_3":{"presence":false,"distance_cm":0},"direction":"CENTER"}</text>

  <!-- Timestamp -->
  <text x="390" y="408" text-anchor="middle" font-size="9" fill="#484f58">Last update: 2025-06-17 11:51:32</text>
</svg>
